version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '3006:3001'
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-cricket_jwt_secret_please_change_in_prod}
      FRONTEND_URL: ${FRONTEND_URL:-https://llr-intra-hall-cricket.paperknife.app}
      DB_PATH: /app/data/cricket.db
    volumes:
      - cricket-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # NEXT_PUBLIC_* vars are baked at build time.
        # Default to localhost:3006 for local dev; override for production deploys.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3006}
    ports:
      - '3005:3000'
    environment:
      # Next standalone must bind 0.0.0.0 (Docker sets HOSTNAME to the container id by default).
      HOSTNAME: '0.0.0.0'
      # Server-side SSR fetch uses Docker internal hostname
      API_URL_INTERNAL: http://backend:3001
      # Runtime NEXT_PUBLIC_ vars are ignored — only the build-time ARG matters for browser code
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3006}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cricket-data:
